<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View File - {{ file.filename }}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary:    #0d6efd;
            --light-bg:   #f8f9fc;
            --card-shadow: 0 6px 20px rgba(0,0,0,0.08);
        }

        body {
            background-color: var(--light-bg);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .viewer-header {
            font-weight: 700;
            color: #1a1f36;
            letter-spacing: -0.4px;
        }

        .viewer-card {
            border: none;
            border-radius: 14px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            background: white;
        }

        .iframe-wrapper {
            position: relative;
            width: 100%;
            padding-top: 141.42%;           /* ≈ A4 ratio 1:1.4142 → good starting point for PDFs */
            background: #f0f2f5;
            border-radius: 10px;
            overflow: hidden;
        }

        .iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .img-wrapper {
            max-width: 100%;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn-lg {
            padding: 0.75rem 1.5rem;
            font-size: 1.05rem;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.4s;
        }

        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        @media (min-width: 992px) {
            .iframe-wrapper {
                padding-top: 75%;          /* Wider on desktop → better experience */
            }
        }

        @media (max-width: 576px) {
            .btn { width: 100%; margin-bottom: 0.75rem; }
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
            <h2 class="viewer-header mb-0">
                <i class="bi bi-file-earmark-text me-2 text-primary"></i>
                {{ file.filename }}
            </h2>
            <a href="/" class="btn btn-outline-secondary btn-lg">
                <i class="bi bi-arrow-left me-1"></i> Back to Files
            </a>
        </div>

        <div class="viewer-card p-3 p-md-4">

            {% if file.type == 'pdf' %}
            <div class="mb-4">
                <h5 class="fw-semibold mb-3 text-secondary">PDF Preview</h5>

                <div class="iframe-wrapper">
                    <!-- Optional loading spinner -->
                    <div class="loading-overlay" id="pdfLoading">
                        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                    </div>

                    <iframe 
                        src="https://drive.google.com/file/d/{{ file.file_id }}/preview"
                        allowfullscreen
                        loading="lazy">
                    </iframe>
                </div>

                <div class="mt-4 text-center text-md-start">
                    <a href="{{ file.download_url }}" class="btn btn-success btn-lg">
                        <i class="bi bi-download me-2"></i> Download PDF
                    </a>
                </div>
            </div>

            {% else %}
            <div class="mb-4">
                <h5 class="fw-semibold mb-3 text-secondary">Image Preview</h5>

                <div class="img-wrapper mx-auto" style="max-width: 900px;">
                    <img src="{{ file.view_url }}" alt="{{ file.filename }}" loading="lazy">
                </div>

                <div class="mt-4 text-center">
                    <a href="{{ file.view_url }}" target="_blank" class="btn btn-outline-primary btn-lg me-2">
                        <i class="bi bi-fullscreen me-2"></i> Open Full Size
                    </a>
                </div>
            </div>
            {% endif %}

        </div>

    </div>

    <!-- Optional: hide loading spinner after some time or on load -->
    <script>
        // Hide loading overlay after 4 seconds (or you can listen to iframe load if possible)
        setTimeout(() => {
            const loader = document.getElementById('pdfLoading');
            if (loader) loader.classList.add('hidden');
        }, 4000);
    </script>

    <!-- Bootstrap JS (optional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
