<!DOCTYPE html>
<html>
<head>
    <title>View File</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            padding: 20px;
            background: #f5f7fa;
        }
        iframe {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h3>{{ file.filename }}</h3>

{% if file.type == 'pdf' %}
<iframe 
    src="https://drive.google.com/file/d/{{ file.file_id }}/preview"
    width="100%" height="600">
</iframe>

<br><br>

<a href="{{ file.download_url }}" class="btn btn-success">⬇ Download PDF</a>

{% else %}
<img src="{{ file.view_url }}" width="100%" style="border-radius:10px;">
{% endif %}

<br><br>
<a href="/" class="btn btn-primary">⬅ Back</a>

</body>
</html>
